Section "InputClass"
    Identifier      "Synaptics Touchpad"            # required
    MatchIsTouchpad "yes"                           # required
    Driver          "synaptics"                     # required
    Option	    "VertScrollDelta"	    "-79"
    Option	    "HorizTwoFingerScroll"  "1"
    Option          "TapButton1"            "1"
    Option          "TapButton2"            "3"
    Option          "TapButton3"            "0"
EndSection
